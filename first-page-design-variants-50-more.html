<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>날씨체크 첫페이지 디자인 시안 50개 더</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: #111827;
      background: #eef2f7;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
      letter-spacing: 0;
    }
    .page {
      max-width: 1880px;
      margin: 0 auto;
      padding: 28px;
    }
    .intro {
      margin-bottom: 22px;
      display: grid;
      gap: 8px;
    }
    .intro h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 42px);
      line-height: 1.05;
    }
    .intro p {
      margin: 0;
      max-width: 1040px;
      color: #64748b;
      font-size: 15px;
      line-height: 1.55;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(318px, 1fr));
      gap: 22px;
      align-items: start;
    }
    .concept { display: grid; gap: 10px; }
    .caption {
      min-height: 38px;
      padding: 0 4px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
    }
    .caption strong { font-size: 15px; }
    .caption span {
      color: #64748b;
      font-size: 12px;
      font-weight: 850;
      text-align: right;
    }
    .phone {
      --bg: #f8fafc;
      --fg: #111827;
      --muted: #64748b;
      --card: #ffffff;
      --soft: #eff6ff;
      --line: rgba(148,163,184,.26);
      --accent: #2563eb;
      --accent2: #0ea5a4;
      --warn: #f59e0b;
      --shadow: rgba(15,23,42,.16);
      min-height: 690px;
      position: relative;
      overflow: hidden;
      color: var(--fg);
      background: var(--bg);
      border: 8px solid #070a12;
      border-radius: 34px;
      box-shadow: 0 24px 64px rgba(15, 23, 42, .24);
    }
    .status {
      height: 38px;
      padding: 10px 18px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 900;
      position: relative;
      z-index: 3;
    }
    .dots { display: flex; gap: 4px; align-items: center; }
    .dots i {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: currentColor;
      opacity: .75;
    }
    .content {
      padding: 14px 16px 82px;
      display: grid;
      gap: 12px;
      position: relative;
      z-index: 2;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .brand { display: grid; gap: 2px; }
    .brand b { font-size: 17px; line-height: 1.1; }
    .brand span {
      color: currentColor;
      opacity: .62;
      font-size: 12px;
      font-weight: 800;
    }
    .circle {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: color-mix(in srgb, var(--card) 78%, transparent);
      font-weight: 950;
    }
    .search {
      min-height: 48px;
      padding: 0 13px;
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 999px;
      box-shadow: 0 8px 20px color-mix(in srgb, var(--shadow) 26%, transparent);
      font-size: 13px;
      font-weight: 850;
    }
    .search i,
    .search em {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      font-style: normal;
    }
    .hero {
      min-height: 220px;
      padding: 18px;
      display: grid;
      gap: 12px;
      border-radius: var(--radius, 26px);
      position: relative;
      overflow: hidden;
      background: var(--hero, linear-gradient(145deg, var(--soft), var(--card)));
      box-shadow: 0 16px 34px color-mix(in srgb, var(--shadow) 36%, transparent);
    }
    .hero:after {
      content: "";
      position: absolute;
      right: -48px;
      top: -42px;
      width: 150px;
      height: 150px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 18%, transparent);
    }
    h2 {
      margin: 0;
      max-width: 260px;
      font-size: 30px;
      line-height: 1.05;
      position: relative;
      z-index: 1;
    }
    p {
      margin: 0;
      max-width: 260px;
      color: currentColor;
      opacity: .72;
      font-size: 13px;
      line-height: 1.45;
      position: relative;
      z-index: 1;
    }
    .chip {
      width: fit-content;
      min-height: 28px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      background: color-mix(in srgb, var(--card) 72%, transparent);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      position: relative;
      z-index: 1;
    }
    .temp {
      color: currentColor;
      font-size: 56px;
      font-weight: 950;
      line-height: .9;
      position: relative;
      z-index: 1;
    }
    .panel {
      padding: 14px;
      display: grid;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 10px 24px color-mix(in srgb, var(--shadow) 20%, transparent);
    }
    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      font-weight: 900;
    }
    .head span { color: var(--muted); font-size: 12px; }
    .row {
      min-height: 48px;
      padding: 8px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
      border-radius: 15px;
      background: var(--soft);
      font-size: 12px;
      font-weight: 750;
    }
    .row b { display: block; font-size: 13px; }
    .row small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .ico {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 14%, var(--card));
      border-radius: 13px;
      font-size: 11px;
      font-weight: 950;
    }
    .nav {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      min-height: 58px;
      padding: 7px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      background: color-mix(in srgb, var(--card) 84%, transparent);
      border: 1px solid var(--line);
      border-radius: 20px;
      backdrop-filter: blur(14px);
      z-index: 4;
    }
    .nav span {
      display: grid;
      place-items: center;
      align-content: center;
      border-radius: 15px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
    }
    .nav .active { color: #fff; background: var(--accent); }
    .mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .mini {
      min-height: 68px;
      padding: 10px;
      display: grid;
      align-content: center;
      gap: 3px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      font-size: 11px;
      font-weight: 850;
    }
    .mini b { font-size: 18px; }
    .bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: color-mix(in srgb, var(--muted) 18%, transparent);
    }
    .bar i {
      display: block;
      height: 100%;
      width: var(--w);
      background: var(--accent);
      border-radius: inherit;
    }
    .large-number {
      font-size: 82px;
      font-weight: 950;
      line-height: .86;
      letter-spacing: -.04em;
    }

    .theme-aqua { --bg:#ecfeff; --fg:#164e63; --muted:#0e7490; --card:#fff; --soft:#cffafe; --line:#a5f3fc; --accent:#0891b2; --accent2:#06b6d4; --hero:linear-gradient(145deg,#a5f3fc,#fff); }
    .theme-forest { --bg:#f0fdf4; --fg:#14532d; --muted:#15803d; --card:#fff; --soft:#dcfce7; --line:#bbf7d0; --accent:#16a34a; --accent2:#65a30d; --hero:linear-gradient(145deg,#bbf7d0,#f7fee7); }
    .theme-plum { --bg:#faf5ff; --fg:#3b0764; --muted:#7e22ce; --card:#fff; --soft:#f3e8ff; --line:#e9d5ff; --accent:#9333ea; --accent2:#db2777; --hero:linear-gradient(145deg,#e9d5ff,#fce7f3); }
    .theme-amber { --bg:#fffbeb; --fg:#451a03; --muted:#b45309; --card:#fff; --soft:#fef3c7; --line:#fde68a; --accent:#d97706; --accent2:#f59e0b; --hero:linear-gradient(145deg,#fde68a,#fff7ed); }
    .theme-slate { --bg:#0f172a; --fg:#e2e8f0; --muted:#94a3b8; --card:#1e293b; --soft:#111827; --line:rgba(255,255,255,.10); --accent:#60a5fa; --accent2:#22d3ee; --shadow:rgba(0,0,0,.60); --hero:linear-gradient(145deg,#1e3a8a,#0f172a); }
    .theme-rose { --bg:#fff1f2; --fg:#4c0519; --muted:#be123c; --card:#fff; --soft:#ffe4e6; --line:#fecdd3; --accent:#e11d48; --accent2:#fb7185; --hero:linear-gradient(145deg,#fecdd3,#fff); }
    .theme-mono { --bg:#f5f5f4; --fg:#1c1917; --muted:#57534e; --card:#fff; --soft:#e7e5e4; --line:#d6d3d1; --accent:#1c1917; --accent2:#78716c; --hero:linear-gradient(145deg,#fff,#e7e5e4); }
    .theme-cobalt { --bg:#eff6ff; --fg:#172554; --muted:#1d4ed8; --card:#fff; --soft:#dbeafe; --line:#bfdbfe; --accent:#2563eb; --accent2:#0ea5a4; --hero:linear-gradient(145deg,#bfdbfe,#ecfeff); }
    .theme-lime { --bg:#f7fee7; --fg:#365314; --muted:#65a30d; --card:#fff; --soft:#ecfccb; --line:#d9f99d; --accent:#65a30d; --accent2:#16a34a; --hero:linear-gradient(145deg,#d9f99d,#fff); }
    .theme-night { --bg:#09090b; --fg:#fafafa; --muted:#a1a1aa; --card:#18181b; --soft:#27272a; --line:rgba(255,255,255,.11); --accent:#a78bfa; --accent2:#22d3ee; --shadow:rgba(0,0,0,.65); --hero:radial-gradient(circle at 70% 20%,rgba(167,139,250,.34),transparent 28%),linear-gradient(145deg,#18181b,#09090b); }

    .layout-radar .visual {
      min-height: 300px;
      padding: 18px;
      display: grid;
      align-content: space-between;
      border-radius: 30px;
      background:
        radial-gradient(circle at 50% 52%, transparent 0 42px, color-mix(in srgb, var(--accent) 28%, transparent) 43px 45px, transparent 46px 88px, color-mix(in srgb, var(--accent2) 24%, transparent) 89px 91px, transparent 92px),
        conic-gradient(from 140deg at 58% 52%, color-mix(in srgb, var(--accent) 40%, transparent), color-mix(in srgb, var(--accent2) 34%, transparent), transparent, color-mix(in srgb, var(--accent) 40%, transparent)),
        var(--soft);
    }
    .layout-cardwall .wall { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .layout-cardwall .tile {
      min-height: 128px;
      padding: 14px;
      display: grid;
      align-content: space-between;
      border-radius: 22px;
      background: var(--card);
      border: 1px solid var(--line);
    }
    .layout-cardwall .tile.big { grid-column: span 2; min-height: 190px; background: var(--hero); }
    .layout-timeline .timeline {
      padding: 16px;
      display: grid;
      gap: 14px;
      border-radius: 26px;
      background: var(--card);
      border: 1px solid var(--line);
    }
    .layout-timeline .step {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 10px;
      align-items: center;
      position: relative;
    }
    .layout-timeline .step:before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      position: absolute;
      left: 21px;
      top: 20px;
    }
    .layout-timeline .time { font-weight: 950; color: var(--accent); }
    .layout-map .map {
      min-height: 330px;
      padding: 18px;
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      background:
        radial-gradient(circle at 32% 30%, color-mix(in srgb, var(--accent) 24%, transparent) 0 42px, transparent 43px),
        radial-gradient(circle at 76% 62%, color-mix(in srgb, var(--accent2) 22%, transparent) 0 58px, transparent 59px),
        linear-gradient(145deg, var(--soft), var(--card));
    }
    .layout-map .pin {
      position: absolute;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--card);
      box-shadow: 0 10px 20px color-mix(in srgb, var(--shadow) 28%, transparent);
      font-size: 11px;
      font-weight: 950;
    }
    .layout-map .pin.a { left: 22px; top: 88px; }
    .layout-map .pin.b { right: 20px; top: 165px; }
    .layout-map .pin.c { left: 82px; bottom: 34px; }
    .layout-command .command {
      min-height: 340px;
      padding: 16px;
      display: grid;
      gap: 9px;
      align-content: start;
      border-radius: 22px;
      background: var(--soft);
      border: 1px solid var(--line);
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }
    .layout-command .command b { color: var(--accent); }
    .layout-split .split {
      min-height: 330px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      border-radius: 30px;
      border: 1px solid var(--line);
    }
    .layout-split .split > div { padding: 18px; display: grid; align-content: space-between; }
    .layout-split .left { background: var(--accent); color: #fff; }
    .layout-split .right { background: var(--card); color: var(--fg); }
    .layout-orbit .orbit {
      min-height: 340px;
      padding: 18px;
      display: grid;
      place-items: center;
      border-radius: 30px;
      background:
        radial-gradient(circle at 50% 50%, var(--accent) 0 44px, transparent 45px),
        radial-gradient(circle at 50% 50%, transparent 0 90px, color-mix(in srgb, var(--accent) 28%, transparent) 91px 94px, transparent 95px 138px, color-mix(in srgb, var(--accent2) 24%, transparent) 139px 142px, transparent 143px),
        var(--soft);
    }
    .layout-orbit .orbit-card {
      padding: 14px;
      border-radius: 18px;
      background: color-mix(in srgb, var(--card) 84%, transparent);
      text-align: center;
      box-shadow: 0 12px 24px color-mix(in srgb, var(--shadow) 22%, transparent);
    }
    .layout-stack .stack { min-height: 330px; position: relative; }
    .layout-stack .paper {
      position: absolute;
      inset: 0;
      padding: 18px;
      display: grid;
      align-content: space-between;
      border-radius: 28px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 18px 34px color-mix(in srgb, var(--shadow) 24%, transparent);
    }
    .layout-stack .p1 { transform: rotate(-6deg) translate(-8px,18px); opacity:.65; }
    .layout-stack .p2 { transform: rotate(5deg) translate(10px,10px); opacity:.78; background: var(--soft); }
    .layout-stack .p3 { transform: rotate(0); background: var(--hero); }
    .layout-graph .graph {
      min-height: 310px;
      padding: 18px;
      display: grid;
      align-content: space-between;
      border-radius: 28px;
      background: var(--card);
      border: 1px solid var(--line);
    }
    .layout-graph .bars {
      height: 150px;
      display: flex;
      align-items: end;
      gap: 8px;
    }
    .layout-graph .bars i {
      flex: 1;
      height: var(--h);
      border-radius: 999px 999px 8px 8px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
    }
    .layout-ticket .ticket {
      min-height: 330px;
      padding: 18px;
      display: grid;
      align-content: space-between;
      border-radius: 28px;
      background:
        radial-gradient(circle at 0 50%, var(--bg) 0 18px, transparent 19px),
        radial-gradient(circle at 100% 50%, var(--bg) 0 18px, transparent 19px),
        var(--hero);
      border: 1px solid var(--line);
    }

    @media (max-width: 720px) {
      .page { padding: 18px 12px; }
      .grid { grid-template-columns: 1fr; }
      .phone { min-height: 650px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="intro">
      <h1>첫페이지 디자인 시안 50개 더</h1>
      <p>31-50번까지 보고도 더 넓게 보기 위해 51-100번을 추가했습니다. 이번 파일은 레이아웃 타입을 10개로 나누고, 테마와 콘셉트를 바꿔 50개를 빠르게 비교하도록 만들었습니다.</p>
    </section>
    <div class="grid" id="variants"></div>
  </div>

  <script>
    const layouts = {
      radar: (v) => `
        <div class="top"><div class="brand"><b>${v.brand}</b><span>${v.sub}</span></div><div class="circle">${v.badge}</div></div>
        <div class="search"><i>⌕</i><span>${v.query}</span><em>›</em></div>
        <div class="visual"><span class="chip">${v.chip}</span><div><h2>${v.title}</h2><p>${v.copy}</p></div></div>
        <div class="mini-grid"><div class="mini">확신<b>${v.a}</b></div><div class="mini">제보<b>${v.b}</b></div><div class="mini">강수<b>${v.c}</b></div></div>`,
      cardwall: (v) => `
        <div class="top"><div class="brand"><b>${v.brand}</b><span>${v.sub}</span></div><div class="circle">${v.badge}</div></div>
        <div class="search"><i>⌕</i><span>${v.query}</span><em>›</em></div>
        <div class="wall"><div class="tile big"><span class="chip">${v.chip}</span><h2>${v.title}</h2><p>${v.copy}</p></div><div class="tile"><span>현재</span><b>${v.a}</b></div><div class="tile"><span>제보</span><b>${v.b}</b></div><div class="tile"><span>1시간</span><b>${v.c}</b></div><div class="tile"><span>모델</span><b>${v.d}</b></div></div>`,
      timeline: (v) => `
        <div class="top"><div class="brand"><b>${v.brand}</b><span>${v.sub}</span></div><div class="circle">${v.badge}</div></div>
        <div class="hero"><span class="chip">${v.chip}</span><h2>${v.title}</h2><p>${v.copy}</p></div>
        <div class="timeline"><div class="step"><span class="time">지금</span><span><b>${v.a}</b><small>현장 제보 기준</small></span></div><div class="step"><span class="time">+30</span><span><b>${v.b}</b><small>단기 모델 기준</small></span></div><div class="step"><span class="time">+60</span><span><b>${v.c}</b><small>변동 가능성</small></span></div></div>`,
      map: (v) => `
        <div class="top"><div class="brand"><b>${v.brand}</b><span>${v.sub}</span></div><div class="circle">${v.badge}</div></div>
        <div class="search"><i>⌕</i><span>${v.query}</span><em>›</em></div>
        <div class="map"><span class="pin a">${v.a}</span><span class="pin b">${v.b}</span><span class="pin c">${v.c}</span><span class="chip">${v.chip}</span><div style="position:absolute;left:18px;right:18px;bottom:18px"><h2>${v.title}</h2><p>${v.copy}</p></div></div>
        <div class="panel"><div class="head">근처 신호 <span>실시간</span></div><div class="row"><span class="ico">R</span><span><b>${v.d}</b><small>제보와 모델 종합</small></span><b>${v.e}</b></div></div>`,
      command: (v) => `
        <div class="top"><div class="brand"><b>${v.brand}</b><span>${v.sub}</span></div><div class="circle">${v.badge}</div></div>
        <div class="command"><span>$ ask "${v.query}"</span><span>&gt; location: <b>${v.place}</b></span><span>&gt; reports: <b>${v.b}</b></span><span>&gt; rain_now: <b>false</b></span><span>&gt; confidence: <b>${v.a}</b></span><span>&gt; answer: <b>${v.title}</b></span></div>
        <div class="search"><i>$</i><span>명령어 또는 자연어 입력</span><em>↵</em></div>`,
      split: (v) => `
        <div class="search"><i>?</i><span>${v.query}</span><em>›</em></div>
        <div class="split"><div class="left"><span class="chip">${v.chip}</span><h2>${v.title}</h2><div class="large-number">${v.a}</div></div><div class="right"><span class="chip">근거</span><div class="row"><span class="ico">K</span><span><b>기상청</b><small>${v.b}</small></span></div><div class="row"><span class="ico">Y</span><span><b>Yr.no</b><small>${v.c}</small></span></div><div class="row"><span class="ico">W</span><span><b>Windy</b><small>${v.d}</small></span></div></div></div>
        <div class="panel"><div class="head">${v.brand} <span>${v.sub}</span></div><p>${v.copy}</p></div>`,
      orbit: (v) => `
        <div class="top"><div class="brand"><b>${v.brand}</b><span>${v.sub}</span></div><div class="circle">${v.badge}</div></div>
        <div class="orbit"><div class="orbit-card"><span class="chip">${v.chip}</span><h2>${v.title}</h2><p>${v.copy}</p><div class="temp">${v.a}</div></div></div>
