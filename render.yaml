services:
  - type: web
    name: weather-check-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: WEATHER_PROVIDER_MODE
        value: kma,yr,fmi
      - key: YR_USER_AGENT
        value: WeatherCheck/0.1 weathercheck.official@gmail.com
      - key: KMA_SERVICE_KEY
        sync: false
      - key: NODE_VERSION
        value: 24
