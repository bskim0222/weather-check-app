<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>웨더체크 날씨별 판정카드 시안</title>
  <style>
    :root {
      color-scheme: dark;
      --page-bg: #211018;
      --cream: #fff2e9;
      --cream-soft: rgba(255, 240, 237, 0.68);
      --line: rgba(255, 240, 237, 0.17);
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 7%, rgba(255, 122, 138, 0.18), transparent 28rem),
        radial-gradient(circle at 90% 12%, rgba(107, 215, 255, 0.14), transparent 30rem),
        radial-gradient(circle at 50% 100%, rgba(255, 211, 107, 0.1), transparent 34rem),
        var(--page-bg);
      color: var(--cream);
    }

    .page {
      width: min(1720px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 72px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      padding: 0 4px 28px;
      border-bottom: 1px solid var(--line);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 74px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 760px;
      margin: 16px 0 0;
      color: var(--cream-soft);
      font-size: 16px;
      line-height: 1.55;
      font-weight: 680;
    }

    .count {
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255, 240, 237, 0.08);
      font-weight: 950;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      gap: 30px;
      padding-top: 34px;
    }

    .variant {
      min-width: 0;
    }

    .phone {
      position: relative;
      width: min(100%, 360px);
      aspect-ratio: 360 / 730;
      margin: 0 auto;
      overflow: hidden;
      border: 9px solid #12070c;
      border-radius: 38px;
      box-shadow: var(--shadow);
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.08), transparent 11rem),
        var(--phone-bg);
      color: var(--text);
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      z-index: 30;
      width: 96px;
      height: 26px;
      border-radius: 999px;
      background: #12070c;
      transform: translateX(-50%);
    }

    .status {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      font-size: 11px;
      font-weight: 950;
      pointer-events: none;
    }

    .screen {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 52px 16px 82px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--card-line);
      display: grid;
      place-items: center;
      background: conic-gradient(from 30deg, var(--accent), rgba(255,255,255,.04), var(--accent2), rgba(255,255,255,.04), var(--accent));
    }

    .brand-mark::after {
      content: "";
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--center);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--phone-bg) 80%, transparent);
    }

    .brand b {
      display: block;
      font-size: 16px;
      line-height: 1;
      letter-spacing: 0;
    }

    .brand span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
    }

    .temp-pill {
      min-width: 58px;
      min-height: 36px;
      border: 1px solid var(--card-line);
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: var(--center-ink);
      background: var(--center);
      font-size: 16px;
      font-weight: 950;
    }

    .search {
      height: 42px;
      border: 1px solid var(--card-line);
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 8px 0 14px;
      color: var(--muted);
      background: color-mix(in srgb, var(--panel) 74%, transparent);
      font-size: 12px;
      font-weight: 850;
    }

    .search span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .search i {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--accent-ink);
      background: var(--accent);
      font-style: normal;
      font-weight: 950;
    }

    .decision-card {
      position: relative;
      min-height: 372px;
      margin-top: 13px;
      padding: 15px;
      border: 1px solid var(--card-line);
      border-radius: 30px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 39%, color-mix(in srgb, var(--center) 18%, transparent), transparent 8.5rem),
        color-mix(in srgb, var(--panel) 82%, transparent);
    }

    .decision-card::before {
      content: "";
      position: absolute;
      inset: -20px;
      opacity: 0.95;
      background: var(--weather-art);
      pointer-events: none;
    }

    .decision-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0 52%, color-mix(in srgb, var(--panel) 52%, transparent));
      pointer-events: none;
    }

    .meta {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .chip {
      min-height: 27px;
      padding: 0 10px;
      border: 1px solid var(--card-line);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      font-size: 10px;
      font-weight: 950;
      white-space: nowrap;
    }

    .chip.accent {
      color: var(--accent-ink);
      background: var(--accent);
      border-color: var(--accent);
    }

    .weather-stage {
      position: relative;
      z-index: 2;
      height: 212px;
      display: grid;
      place-items: center;
      margin-top: 4px;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--card-line);
    }

    .ring.one {
      width: 210px;
      height: 210px;
    }

    .ring.two {
      width: 154px;
      height: 154px;
      border-style: dashed;
    }

    .ring.three {
      width: 104px;
      height: 104px;
      border: 0;
      background: conic-gradient(var(--accent) 0 74deg, rgba(255,255,255,.06) 74deg 224deg, var(--accent2) 224deg 294deg, rgba(255,255,255,.06) 294deg);
      box-shadow: 0 0 0 1px var(--card-line);
    }

    .weather-glyph {
      position: absolute;
      z-index: 2;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: var(--glyph);
      box-shadow: var(--glyph-shadow);
      transform: translateY(-4px);
    }

    .weather-glyph::before,
    .weather-glyph::after {
      content: "";
      position: absolute;
      background: var(--glyph-extra);
    }

    .center-answer {
      position: relative;
      z-index: 3;
      width: 126px;
      height: 126px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--center-ink);
      background: var(--center);
      box-shadow: 0 17px 38px rgba(0, 0, 0, 0.24);
    }

    .center-answer span {
      display: block;
      color: color-mix(in srgb, var(--center-ink) 64%, transparent);
      font-size: 10px;
      font-weight: 950;
    }

    .center-answer b {
      display: block;
      margin-top: 5px;
      font-size: 25px;
      line-height: 0.95;
      letter-spacing: 0;
    }

    .answer {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      margin-top: 4px;
    }

    .answer h2 {
      margin: 0;
      font-size: 28px;
      line-height: 0.98;
      letter-spacing: 0;
    }

    .answer p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.42;
      font-weight: 760;
    }

    .big-temp {
      color: var(--text);
      font-size: 46px;
      line-height: 0.9;
      font-weight: 950;
      letter-spacing: 0;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .stat {
      min-height: 68px;
      padding: 10px;
      border: 1px solid var(--card-line);
      border-radius: 18px;
      background: color-mix(in srgb, var(--panel) 72%, transparent);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
    }

    .stat b {
      display: block;
      margin-top: 7px;
      font-size: 16px;
      line-height: 1;
    }

    .source-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      margin-top: 10px;
    }

    .source {
      min-height: 58px;
      padding: 8px 7px;
      border: 1px solid var(--card-line);
      border-radius: 16px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 4px;
      text-align: center;
      background: color-mix(in srgb, var(--panel) 70%, transparent);
    }

    .source img {
      width: 18px;
      height: 18px;
      object-fit: contain;
      border-radius: 5px;
      background: var(--center);
    }

    .source span {
      color: var(--muted);
      font-size: 9px;
      font-weight: 950;
      line-height: 1;
    }

    .bottom-nav {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 14px;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      padding: 7px;
      border: 1px solid var(--card-line);
      border-radius: 22px;
      background: color-mix(in srgb, var(--nav) 88%, transparent);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.24);
    }

    .bottom-nav div {
      height: 35px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 10px;
      font-weight: 950;
    }

    .bottom-nav div:first-child {
      color: var(--center-ink);
      background: var(--center);
    }

    .caption {
      width: min(100%, 360px);
      margin: 14px auto 0;
    }

    .caption strong {
      display: block;
      font-size: 18px;
      letter-spacing: 0;
    }

    .caption span {
      display: block;
      margin-top: 6px;
      color: var(--cream-soft);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 660;
    }

    .sunny .weather-glyph::before {
      inset: -18px;
      border-radius: 50%;
      border: 2px dashed color-mix(in srgb, var(--accent) 70%, transparent);
      background: transparent;
    }

    .cloudy .weather-glyph,
    .overcast .weather-glyph,
    .rain .weather-glyph,
    .shower .weather-glyph,
    .snow .weather-glyph,
    .thunder .weather-glyph,
    .fog .weather-glyph,
    .wind .weather-glyph {
      width: 112px;
      height: 62px;
      border-radius: 42px;
      transform: translateY(-2px);
    }

    .cloudy .weather-glyph::before,
    .overcast .weather-glyph::before,
    .rain .weather-glyph::before,
    .shower .weather-glyph::before,
    .snow .weather-glyph::before,
    .thunder .weather-glyph::before,
    .fog .weather-glyph::before,
    .wind .weather-glyph::before {
      left: 18px;
      top: -28px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: inherit;
      box-shadow: 42px 14px 0 -8px var(--glyph-extra);
    }

    .rain .weather-glyph::after,
    .shower .weather-glyph::after {
      left: 18px;
      top: 76px;
      width: 88px;
      height: 50px;
      background:
        linear-gradient(110deg, transparent 0 38%, var(--accent2) 39% 48%, transparent 49%) 0 0 / 24px 32px repeat-x;
    }

    .snow .weather-glyph::after {
      left: 11px;
      top: 78px;
      width: 92px;
      height: 44px;
      border-radius: 0;
      background:
        radial-gradient(circle, var(--accent2) 0 3px, transparent 4px) 0 0 / 24px 24px,
        radial-gradient(circle, var(--center) 0 2px, transparent 3px) 12px 10px / 26px 26px;
    }

    .thunder .weather-glyph::after {
      left: 45px;
      top: 42px;
      width: 40px;
      height: 82px;
      clip-path: polygon(42% 0, 100% 0, 64% 38%, 94% 38%, 28% 100%, 44% 52%, 12% 52%);
      background: var(--accent);
      filter: drop-shadow(0 0 18px color-mix(in srgb, var(--accent) 55%, transparent));
    }

    .fog .weather-glyph::after {
      left: -4px;
      top: 80px;
      width: 122px;
      height: 52px;
      border-radius: 0;
      background:
        linear-gradient(var(--muted), var(--muted)) 0 0 / 100% 4px no-repeat,
        linear-gradient(var(--muted), var(--muted)) 16px 20px / 82% 4px no-repeat,
        linear-gradient(var(--muted), var(--muted)) 0 40px / 100% 4px no-repeat;
    }

    .wind .weather-glyph::after {
      left: -8px;
      top: 80px;
      width: 130px;
      height: 54px;
      border-radius: 0;
      background:
        linear-gradient(var(--accent2), var(--accent2)) 0 4px / 96px 4px no-repeat,
        linear-gradient(var(--accent2), var(--accent2)) 28px 24px / 96px 4px no-repeat,
        linear-gradient(var(--accent2), var(--accent2)) 8px 44px / 70px 4px no-repeat;
    }

    .heat .weather-glyph::before {
      inset: -24px;
      border-radius: 50%;
      background:
        radial-gradient(circle, transparent 0 52%, color-mix(in srgb, var(--accent) 44%, transparent) 53% 55%, transparent 56%),
        conic-gradient(from 10deg, transparent 0 8deg, color-mix(in srgb, var(--accent) 45%, transparent) 8deg 14deg, transparent 14deg 35deg);
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 18px, 390px);
        padding-top: 24px;
      }

      .hero {
        display: block;
      }

      .count {
        display: inline-grid;
        margin-top: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 34px;
      }
    }
  </style>
</head>

    function varStyle(vars) {
      return Object.entries(vars)
        .map(([key, value]) => `--${key.replace(/[A-Z]/g, (letter) => `-${letter.toLowerCase()}`)}:${value}`)
        .join(';');
    }

    function source(label, icon) {
      return `<div class="source"><img src="${icon}" alt=""><span>${label}</span></div>`;
    }

    function renderCard(item) {
      return `
        <article class="variant ${item.cls}">
          <div class="phone" style="${varStyle(item.vars)}">
            <div class="status"><span>9:41</span><span>5G</span></div>
            <div class="screen">
              <div class="top">
                <div class="brand">
                  <div class="brand-mark"></div>
                  <div><b>웨더체크</b><span>기상 나침반 판정</span></div>
                </div>
                <div class="temp-pill">${item.temp}</div>
              </div>

              <div class="search">
                <span>잠실운동장 지금 비 와?</span>
                <i>↗</i>
              </div>

              <section class="decision-card">
                <div class="meta">
                  <span class="chip accent">${item.meta}</span>
                  <span class="chip">3분 전</span>
                </div>

                <div class="weather-stage">
                  <div class="ring one"></div>
                  <div class="ring two"></div>
                  <div class="ring three"></div>
                  <div class="weather-glyph"></div>
                  <div class="center-answer">
                    <div><span>판정</span><b>${item.verdict}</b></div>
                  </div>
                </div>

                <div class="answer">
                  <div>
                    <h2>${item.title}</h2>
                    <p>예보 3곳과 현장 제보를 함께 본 결과입니다.</p>
                  </div>
                  <div class="big-temp">${item.temp}</div>
                </div>
              </section>

              <div class="stats">
                <div class="stat"><span>확신도</span><b>${item.confidence}</b></div>
                <div class="stat"><span>제보</span><b>${item.reports}</b></div>
                <div class="stat"><span>위험도</span><b>${item.rain}</b></div>
              </div>

              <div class="source-row">
                ${source(item.evidence[0], 'assets/icon-kma.ico')}
                ${source(item.evidence[1], 'assets/icon-yr.png')}
                ${source(item.evidence[2], 'assets/icon-windy.ico')}
                ${source(item.evidence[3], 'assets/icon-kma.ico')}
              </div>

              <nav class="bottom-nav">
                <div>판정</div><div>지도</div><div>제보</div><div>비교</div>
              </nav>
            </div>
          </div>
          <div class="caption">
            <strong>${item.name}</strong>
            <span>${item.note}</span>
          </div>
        </article>
      `;
    }

    document.getElementById('cards').innerHTML = variants.map(renderCard).join('');
  </script>
