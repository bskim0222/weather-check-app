services:
  - type: web
    name: weather-check-web
    runtime: static
    rootDir: mobile-app
    buildCommand: pnpm run export:web:api:node
    staticPublishPath: dist-phone
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: EXPO_PUBLIC_DATA_MODE
        value: api
      - key: EXPO_PUBLIC_API_BASE_URL
        value: https://weather-check-backend-hvfs.onrender.com
      - key: NODE_VERSION
        value: 24

  - type: web
    name: weather-check-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: WEATHER_PROVIDER_MODE
        value: kma,yr,fmi
      - key: YR_USER_AGENT
        value: WeatherCheck/0.1 weathercheck.official@gmail.com
      - key: KMA_SERVICE_KEY
        sync: false
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 24
